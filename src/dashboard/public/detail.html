<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session detail — OLTestStack</title>
  <link rel="stylesheet" href="/dashboard/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/dashboard/" class="brand">
        <span class="brand-mark">OL</span>
        <span class="brand-text">TestStack Sessions</span>
      </a>
      <button type="button" id="theme-toggle" class="btn btn-ghost" aria-label="Toggle theme">Theme</button>
    </div>
  </header>

  <main class="container">
    <p class="breadcrumb"><a href="/dashboard/">← All sessions</a></p>

    <div id="banner" class="banner hidden" role="status"></div>
    <div id="detail-root" class="detail-root">
      <p class="loading">Loading session…</p>
    </div>
  </main>

  <script src="/dashboard/app.js"></script>
  <script>
    initThemeToggle();
    initSessionDetail();
  </script>
</body>
</html>
