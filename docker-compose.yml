# OLTestStack — local development infrastructure
#
# Ports (non-default by design):
#   PostgreSQL  host 5433 → container 5432
#   App health  host 8081 → container 8081
#   MCP HTTP    host 8082 → container 8082  (Streamable HTTP when app profile runs)
#
# Quick start (Postgres only):
#   docker compose up -d postgres
#   cp .env.example .env
#   bun run db:migrate
#   bun run dev
#
# Full stack (MCP over HTTP in Docker):
#   docker compose --profile app up -d
#   curl http://localhost:8081/health
#   curl -s -X POST http://localhost:8082/mcp -H 'Content-Type: application/json' -H 'Accept: application/json, text/event-stream' -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"curl","version":"1.0.0"}}}'

services:
  postgres:
    image: postgres:16-alpine
    container_name: olteststack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oltest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oltest}
      POSTGRES_DB: ${POSTGRES_DB:-olteststack}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - olteststack-pgdata:/var/lib/postgresql/data
    networks:
      - olteststack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oltest} -d ${POSTGRES_DB:-olteststack}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MCP server over Streamable HTTP (default transport in container).
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: olteststack-app
    profiles:
      - app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oltest}:${POSTGRES_PASSWORD:-oltest}@postgres:5432/${POSTGRES_DB:-olteststack}
      PERSIST_RECORDING: ${PERSIST_RECORDING:-true}
      HEALTH_PORT: ${HEALTH_PORT:-8081}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-http}
      MCP_HTTP_HOST: ${MCP_HTTP_HOST:-0.0.0.0}
      MCP_HTTP_PORT: ${MCP_HTTP_PORT:-8082}
      BROWSER_HEADLESS: ${BROWSER_HEADLESS:-true}
    ports:
      - "${APP_HOST_PORT:-8081}:8081"
      - "${MCP_HOST_PORT:-8082}:8082"
    volumes:
      - ./screenshots:/app/screenshots
    networks:
      - olteststack-net

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: olteststack-migrate
    profiles:
      - migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-oltest}:${POSTGRES_PASSWORD:-oltest}@postgres:5432/${POSTGRES_DB:-olteststack}
    command: ["bun", "run", "db:migrate"]
    networks:
      - olteststack-net

networks:
  olteststack-net:
    name: olteststack-net
    driver: bridge

volumes:
  olteststack-pgdata:
    name: olteststack-pgdata
